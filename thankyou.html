<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — The Film Estate</title>
  <meta name="description" content="Thank you for your enquiry. The Film Estate event planners will connect with you shortly." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Outfit:wght@300;400;500;600&family=Dancing+Script:wght@600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .thankyou-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem 4rem;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }
    
    .thankyou-card {
      background: linear-gradient(145deg, var(--dark-3), var(--mid));
      border: 1px solid rgba(201, 168, 76, 0.22);
      border-radius: var(--radius-xl);
      padding: 4.5rem 3.5rem;
      width: 100%;
      max-width: 600px;
      text-align: center;
      position: relative;
      box-shadow: var(--shadow-deep);
      animation: fadeInUp 0.8s ease both;
      backdrop-filter: blur(12px);
    }
    
    .thankyou-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold-light), var(--gold), var(--gold-dark));
      background-size: 200% auto;
      animation: shimmerBadge 4s linear infinite;
    }
    
    .success-icon {
      font-size: 4.5rem;
      color: var(--gold-light);
      margin-bottom: 2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 0 15px rgba(201,168,76,0.45));
      animation: iconPop 1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    
    .thankyou-title {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 5vw, 3.5rem);
      font-weight: 600;
      color: var(--white);
      margin-bottom: 1.2rem;
      line-height: 1.1;
    }
    
    .thankyou-title em {
      font-style: italic;
      background: linear-gradient(135deg, var(--gold-pale), var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 400;
    }
    
    .thankyou-desc {
      font-size: 1.1rem;
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 3rem;
      font-weight: 300;
    }
    
    @keyframes iconPop {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    
    @media (max-width: 480px) {
      .thankyou-card {
        padding: 3rem 1.5rem;
      }
      .success-icon {
        font-size: 3.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- ===================== CUSTOM CURSOR ===================== -->
  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- ===================== NAVIGATION ===================== -->
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-inner" style="justify-content: center;">
      <a href="index.html" class="nav-logo">
        <img src="images/logo.png" alt="The Film Estate Logo" />
      </a>
    </div>
  </nav>

  <!-- ===================== THANK YOU CONTAINER ===================== -->
  <main class="thankyou-wrapper">
    <!-- Floating Particles -->
    <div class="particles-container" id="particlesContainer"></div>
    
    <div class="thankyou-card">
      <div class="success-icon">🎊</div>
      <h1 class="thankyou-title">Thank <em>You!</em></h1>
      <p class="thankyou-desc">Your response is submitted.<br/>We will connect you shortly.</p>
      <a href="index.html" class="btn btn-gold">
        <span>Back to Homepage</span>
        <span class="btn-shimmer"></span>
      </a>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
